name: Sync Fork

on:
  schedule:
    - cron: '*/15 * * * *'

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Sync Fork
        uses: tgymnich/fork-sync@v1.8
        with:
          owner: sm-monirulislam
          repo: SM-Live-TV
          token: ${{ secrets.GITHUB_TOKEN }}
          head: main
          base: main
